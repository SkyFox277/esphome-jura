substitutions:
  devicename: jura-coffee-f50
  friendly_name: Jura Coffee F50
  device_description: Jura Impressa F50 - D1 Mini ESP8266

packages:
  device_base: !include common/device_base.yaml
  wifi: !include common/wifi.yaml

esphome:
  friendly_name: ${friendly_name}
  platformio_options:
    build_flags:
      # USE_DEBUG_HTTP exposes a read-only REST API on port 8080 for protocol
      # investigation (see dumps/README.md). The endpoints have no auth — only
      # enable on trusted networks and remove once debugging is done.
      - "-DUSE_DEBUG_HTTP"
    build_unflags:
      - "-Werror"

esp8266:
  board: d1_mini
  framework:
    version: recommended

logger:
  level: DEBUG

uart:
  id: uart_bus
  tx_pin: D1
  rx_pin: D2
  baud_rate: 9600

external_components:
  - source:
      type: local
      path: components
    components: [jura_coffee]

jura_coffee:
  id: jura
  uart_id: uart_bus
  machine_type: f50   # sets ic_tray_inverted: true and IC: bit positions automatically
  update_interval: 30s

  tray_missing:
    name: "${friendly_name} Tray Missing"
  tank_empty:
    name: "${friendly_name} Tank Empty"
  need_clean:
    name: "${friendly_name} Need Cleaning"
  ready:
    name: "${friendly_name} Ready"
    id: jura_ready
  needs_rinse:
    name: "${friendly_name} Needs Rinse"

  num_single_espresso:
    name: "${friendly_name} Single Espressos"
  num_double_espresso:
    name: "${friendly_name} Double Espressos"
  num_coffee:
    name: "${friendly_name} Coffees"
  num_double_coffee:
    name: "${friendly_name} Double Coffees"
  num_clean:
    name: "${friendly_name} Cleanings"
  num_rinse:
    name: "${friendly_name} Rinses"
  num_descale:
    name: "${friendly_name} Descalings"
  num_coffees_since_clean:
    name: "${friendly_name} Coffees Since Cleaning"
  last_response:
    name: "${friendly_name} Last Response"

# ── Scripts ────────────────────────────────────────────────────────────────────
#
# Start & Rinse: powers on, waits for operating temperature, then rinses.
# Timeout 180s — if machine doesn't reach temperature, script aborts.
#
# ───────────────────────────────────────────────────────────────────────────────

script:
  - id: startup_and_rinse
    then:
      - logger.log: "Startup & Rinse: powering on..."
      - jura_coffee.send_command: {id: jura, command: "AN:01"}
      - wait_until:
          condition:
            binary_sensor.is_on: jura_ready
          timeout: 180s
      - if:
          condition:
            binary_sensor.is_on: jura_ready
          then:
            - logger.log: "Startup & Rinse: ready, rinsing..."
            - delay: 2s
            - jura_coffee.send_command: {id: jura, command: "FA:02"}
          else:
            - logger.log:
                level: WARN
                format: "Startup & Rinse: timeout — machine not ready after 180s"

# ── Buttons ────────────────────────────────────────────────────────────────────
#
# F50 (tested):       FA:06 Coffee  FA:07 Double Coffee  FA:02 Rinse
# F7 / S95:           FA:04 Espresso  FA:06 Coffee  FA:07 2x Coffee  FA:0B Rinse
# E6 / E8:            FA:04 Espresso  FA:09 Coffee  FA:06 Hot Water
# J6:                 FA:07 Espresso  FA:08 2x Espresso  FA:09 Coffee  FA:0A 2x Coffee  FA:0C Menu/Rinse
# ENA 7:              FA:09 Coffee (small)  FA:0A Coffee (large)  FA:08 Steam  FA:0B Hot Water
# X7 / Saphira:       FA:01–FA:07 Products  FA:08 Hot Water  FA:09 Steam  FA:0B Rinse
#
# ───────────────────────────────────────────────────────────────────────────────

button:
  - platform: template
    name: "${friendly_name} Power On"
    icon: mdi:power
    on_press:
      - jura_coffee.send_command: {id: jura, command: "AN:01"}

  - platform: template
    name: "${friendly_name} Start & Rinse"
    icon: mdi:coffee-maker
    on_press:
      - script.execute: startup_and_rinse

  - platform: template
    name: "${friendly_name} Power Off"
    icon: mdi:power-off
    on_press:
      - jura_coffee.send_command: {id: jura, command: "AN:02"}

  - platform: template
    name: "${friendly_name} Rinse"
    icon: mdi:water
    on_press:
      - jura_coffee.send_command: {id: jura, command: "FA:02"}

  - platform: template
    name: "${friendly_name} Coffee"
    icon: mdi:coffee
    on_press:
      - jura_coffee.send_command: {id: jura, command: "FA:06"}

  - platform: template
    name: "${friendly_name} Double Coffee"
    icon: mdi:coffee
    on_press:
      - jura_coffee.send_command: {id: jura, command: "FA:07"}

  # E6 / J6: uncomment and adjust command for your model
  # - platform: template
  #   name: "${friendly_name} Espresso"
  #   icon: mdi:coffee-outline
  #   on_press:
  #     - jura_coffee.send_command: {id: jura, command: "FA:07"}  # E6/J6: espresso

# ── Debug Dump ────────────────────────────────────────────────────────────────
#
# Start: polls IC:, RR:03–RR:06, RT:0000 every 2s → output in ESPHome log
# Stop:  ends the dump cycle
# User commands (Coffee, Rinse, etc.) are logged as [CMD] in the dump timeline.
#
# ───────────────────────────────────────────────────────────────────────────────

  - platform: template
    name: "${friendly_name} Debug Start"
    icon: mdi:bug-play
    entity_category: diagnostic
    on_press:
      - jura_coffee.start_debug:
          id: jura
          rr_start: 0x03
          rr_end: 0x06
          interval_ms: 2000
          poll_ic: true
          poll_rt: true

  - platform: template
    name: "${friendly_name} Debug Stop"
    icon: mdi:bug-stop
    entity_category: diagnostic
    on_press:
      - jura_coffee.stop_debug:
          id: jura

# ── Command Input ─────────────────────────────────────────────────────────────
#
# Free-form text input for sending any Jura command (e.g. RT:0010, RR:18, TY:).
# Response appears in the "Last Response" text sensor.
# AN:0A is blocked by the component (EEPROM clear protection).
#
# ───────────────────────────────────────────────────────────────────────────────

text:
  - platform: template
    name: "${friendly_name} Send Command"
    id: jura_command_input
    icon: mdi:console
    entity_category: diagnostic
    mode: text
    optimistic: true
    min_length: 2
    max_length: 20
    on_value:
      - jura_coffee.send_command:
          id: jura
          command: !lambda 'return x;'
